; Lines starting ; (semicolons) are commented out.
; That is, they do not affect the code and are here for demonstration purposes only.
; ----------------------------------

[Rainmeter]
Update=1000

[Metadata]
    Name=MARATERM_NETWORK_MONITOR.ini
    Author=crimsonHecatomb
    Description=Displays network activity.
    License=Creative Commons BY-NC-SA 3.0
    Version=1.0.0

[Variables]
    ; Variables declared here can be used later on between two # characters (e.g. #MyVariable#).
    ; Hypothetical speeds, sould be modified.
            maxDownload=10485760
            maxUpload=10485760
    ; Base aesthetics
        ; Floating widgets
            BackgroundMode=2
            WIDGBackground=0, 0, 0, 1 ; Almost Transparent, helps with hitbox
            WIDGFont=Monaco

        ; The colors
            ColorTYC=255, 0, 0, 255    ; Red
            ColorDUR=0, 255, 0, 255    ; Green
            ColorLEE=0, 0, 255, 255    ; Blue
            ColorTERM=255, 255, 255, 255   ; White

        ; Dimmed background colors for the empty part of the bars
            DimTYC=50, 0, 0, 255   ; Dimmed Red
            DimDUR=0, 50, 0, 255   ; Dimmed Green
            DimLEE=0, 0, 50, 255   ; Dimmed Blue

; ----------------------------------
; STYLES are used to "centralize" options
; ----------------------------------

    [StyleText]
        FontFace=#WIDGFont#
        FontSize=12
        AntiAlias=0

    [StyleBar]
        W=225
        H=20
        AntiAlias=0
        BarOrientation=HORIZONTAL

; ----------------------------------
; MEASURES return some kind of value
; ----------------------------------

    [measureNetIn]
        Measure=NetIn
        NetInSpeed=#maxDownload#
        ; NetInSpeed must be set so your maximun download speed for the download bar to scale correctly

    [measureNetOut]
        Measure=NetOut
        NetOutSpeed=#maxUpload#

; ----------------------------------
; METERS display images, text, bars, etc.
; ----------------------------------

    ; The Background Box (Invisible but still bounding)
    [MeterBackground]
        Meter=Image
        SolidColor=#WIDGBackground#
        W=335
        H=220

    ; Widget Name
    [MeterTitle]
        Meter=String
        MeterStyle=StyleText
        X=10
        Y=0
        FontSize=14
        FontWeight=600
        FontColor=#ColorDUR#
        Text="NETWORK STATISTICS"

    ; --- DOWNLOAD SECTION ---
    [MeterDLLabel]
        Meter=String
        MeterStyle=StyleText
        X=10
        Y=25
        FontColor=#ColorLEE#
        Text="DOWNLOAD"

    [MeterDLValue]
        Meter=String
        MeterStyle=StyleText
        MeasureName=measureNetIn
        X=235
        Y=25
        FontColor=#ColorTERM#
        Text="%1B/s"
        NumOfDecimals=1
        AutoScale=1
        StringAlign=Right

    [MeterDLBar]
        Meter=Bar
        MeterStyle=StyleBar
        MeasureName=measureNetIn
        BarColor=#ColorLEE#
        SolidColor=#DimLEE#
        X=10
        Y=50

    ; --- UPLOAD SECTION ---
    [MeterULLabel]
        Meter=String
        MeterStyle=StyleText
        X=10
        Y=70
        FontColor=#ColorTYC#
        Text="UPLOAD"

    [MeterULValue]
        Meter=String
        MeterStyle=StyleText
        MeasureName=measureNetOut
        X=235
        Y=70
        FontColor=#ColorTERM#
        Text="%1B/s"
        NumOfDecimals=1
        AutoScale=1
        StringAlign=Right

    [MeterULBar]
        Meter=Bar
        MeterStyle=StyleBar
        MeasureName=measureNetOut
        BarColor=#ColorTYC#
        SolidColor=#DimTYC#
        X=10
        Y=93

    ; The Network settings Button
    [MeterSettingsButton]
        Meter=String
        MeterStyle=StyleText
        SolidColor=#WIDGBackground#
        X=10
        Y=115
        W=220
        H=25
        FontColor=#ColorTERM#
        Text="[ OPEN NETWORK SETTINGS ]"
        Padding=5,5,5,5
        LeftMouseUpAction=["ms-settings:network-status"]
        MouseOverAction=[!SetOption MeterSettingsButton FontColor "255, 255, 0, 255"][!UpdateMeter MeterSettingsButton][!Redraw]
        MouseLeaveAction=[!SetOption MeterSettingsButton FontColor "#ColorTERM#"][!UpdateMeter MeterSettingsButton][!Redraw]