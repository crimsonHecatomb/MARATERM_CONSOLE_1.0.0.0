; Lines starting ; (semicolons) are commented out.
; That is, they do not affect the code and are here for demonstration purposes only.
; ----------------------------------

[Rainmeter]
Update=1000

[Metadata]
Name=MARATERM_INFORMATION_MODULE.ini
Author=crimsonHecatomb
Description=Displays your shortened IP, the current date and time.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
    ; Variables declared here can be used later on between two # characters (e.g. #MyVariable#).
    ; Base aesthetics
        ; Top and bottom bars
            BARBackground=39, 1, 0, 255    ; Faded Red
            BARFontColor=255, 0, 0, 255    ; Red
            BARFont=Courier New
            BARFontSize=40

        ; Bar margins. Change these to shift all elements at once
            MarginTop=13
            MarginLeft=15
            MarginRight=15

; ----------------------------------
; STYLES are used to "centralize" options
; ----------------------------------

    [StyleText]
        FontFace=#BARFont#
        FontSize=#BARFontSize#
        FontColor=#BARFontColor#
        AntiAlias=0

; ----------------------------------
; MEASURES return some kind of value
; ----------------------------------

    [MeasureIP]
    ; This measure returns your IPv4 address. WebParser measures are relatively complicated. If you're a beginner with
    ; Rainmeter, take a look at some of the other illustro skins before modifying this one.
    ; For more information, go here: https://docs.rainmeter.net/tips/finding-your-network-interface-for-sysInfo-and-net/
    ; This one is for aesthetics and to assign everyone a personalized terminal number
        Measure=Plugin
        Plugin=SysInfo
        SysInfoType=IP_ADDRESS
        SysInfoData=Best
        RegExpSubstitute=1
        Substitute="^\d+\.(.*)$":"\1"

    [MeasureTime]
    ; This measure returns the time in a 24-hour format (i.e. HH:MM).
        Measure=Time
        Format=%H%M
    ; For a 12-hour clock, change the Format option above to: %I:%M %p
    ; Refer to the Rainmeter manual for other format codes.

    [MeasureDate]
    ; Returns the date as DD.MM.YYYY
        Measure=Time
        Format=%d.%m.%Y

; ----------------------------------
; METERS display images, text, bars, etc.
; ----------------------------------

    ; The Background Box
    [MeterBackground]
        Meter=Image
        SolidColor=#BARBackground#
        W=#SCREENAREAWIDTH#
        H=84

    ; 2. The Left Text (Override Status & IP)
    [MeterLeftText]
        Meter=String
        MeterStyle=StyleText
        MeasureName=MeasureIP
        X=#MarginLeft#
        Y=#MarginTop#
        Text="UESCTerm %1 (remote override)"
        StringAlign=Left
        
    ; 3. The Right Text (Date and Time)
    [MeterRightText]
        Meter=String
        MeterStyle=StyleText
        MeasureName=MeasureTime
        MeasureName2=MeasureDate
        ; This positions the text dynamically based on your screen width
        X=(#SCREENAREAWIDTH# -15)
        Y=#MarginTop#
        Text="%1 %2"
        StringAlign=Right